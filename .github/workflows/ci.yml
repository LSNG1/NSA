name: CI Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  check-secrets:
    name: Check no secrets committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secret files
        run: |
          FORBIDDEN=$(find . \
            -name "*.tfvars" \
            -o -name "*.pem" \
            -o -name "*.key" \
            -o -name "id_rsa" \
            -o -name "id_ed25519" \
            -o -name "*.p12" \
            -o -name "*.pfx" \
            -o -name "vault_pass.txt" \
            -o -name "terraform.tfstate" \
            -o -name "terraform.tfstate.backup" \
            -o -name ".env" \
            | grep -v ".git")
          if [ -n "$FORBIDDEN" ]; then
            echo "ERROR: fichiers sensibles détectés :"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "OK - aucun fichier sensible trouvé"

  ansible-syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible ansible-lint
      - name: Syntax check playbooks
        run: |
          for playbook in ansible/playbooks/*.yml; do
            echo "Checking $playbook..."
            ansible-playbook --syntax-check \
              -i ansible/inventory/hosts.ini "$playbook"
          done

  terraform-check:
    name: OpenTofu validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
      - name: Validate site1
        run: |
          cd terraform/site1
          tofu init -backend=false
          tofu validate
      - name: Validate site2
        run: |
          cd terraform/site2
          tofu init -backend=false
          tofu validate
